openapi: 3.1.0
info:
  title: AISoftware Studio Marketing API
  version: 0.1.0
  description: API contract for the marketing website MVP contact intake.
servers:
  - url: http://localhost:8000
    description: Local development backend
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check backend health
      tags:
        - health
      responses:
        "200":
          description: Backend is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/contact:
    post:
      operationId: submitContactInquiry
      summary: Submit a contact inquiry
      tags:
        - contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInquiryRequest"
      responses:
        "202":
          description: Inquiry accepted and notification queued or sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryAccepted"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "429":
          description: Too many contact attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Contact delivery is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - marketing-api
    ContactInquiryRequest:
      type: object
      required:
        - name
        - email
        - projectType
        - budgetRange
        - message
        - consent
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        company:
          type:
            - string
            - "null"
          maxLength: 160
        projectType:
          $ref: "#/components/schemas/ProjectType"
        budgetRange:
          $ref: "#/components/schemas/BudgetRange"
        message:
          type: string
          minLength: 20
          maxLength: 4000
        consent:
          type: boolean
          const: true
    ProjectType:
      type: string
      enum:
        - custom_web_app
        - ai_automation
        - backend_api
        - business_process_automation
        - external_integration
        - dashboard_internal_tool
        - mvp_prototype
        - other
    BudgetRange:
      type: string
      enum:
        - under_10k_pln
        - 10k_25k_pln
        - 25k_50k_pln
        - 50k_100k_pln
        - over_100k_pln
        - not_sure
    ContactInquiryAccepted:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum:
            - accepted
        message:
          type: string
          example: Dziekujemy. Wiadomosc zostala przyjeta.
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: array
          items:
            type: object
            required:
              - loc
              - msg
              - type
            properties:
              loc:
                type: array
                items:
                  anyOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string
