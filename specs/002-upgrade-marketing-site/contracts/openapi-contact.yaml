openapi: 3.1.0
info:
  title: AISoftware Studio Contact Intake Contract
  version: 0.2.0
  description: Feature-specific contract checkpoint for POST /api/contact after adding productized project type values.
paths:
  /api/contact:
    post:
      summary: Submit a contact inquiry
      description: Reuses the existing contact intake endpoint. No database, CRM, billing, authentication, admin backend, RAG runtime, voice runtime, WhatsApp API, or payment flow is added.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInquiryRequest'
      responses:
        '202':
          description: Inquiry accepted by the existing contact flow
        '422':
          description: Validation error
        '429':
          description: Too many contact attempts
        '503':
          description: Contact delivery failure
components:
  schemas:
    ContactInquiryRequest:
      type: object
      required:
        - name
        - email
        - projectType
        - budgetRange
        - message
        - consent
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        company:
          type:
            - string
            - 'null'
          maxLength: 160
        projectType:
          $ref: '#/components/schemas/ProjectType'
        budgetRange:
          type: string
        message:
          type: string
          minLength: 20
          maxLength: 4000
        consent:
          type: boolean
          const: true
    ProjectType:
      type: string
      description: Must match frontend contact options and backend ProjectType enum if the backend remains enum-based.
      x-contract-check: Verified against the strict backend ProjectType enum, frontend contact options, frontend request union, and generated FastAPI OpenAPI schema.
      enum:
        - rag_chatbot_demo
        - website_seo
        - voice_agent_demo
        - whatsapp_agent_management
        - email_automation
        - agent_management_panel
        - custom_web_app
        - ai_automation
        - backend_api
        - business_process_automation
        - external_integration
        - dashboard_internal_tool
        - mvp_prototype
        - other
