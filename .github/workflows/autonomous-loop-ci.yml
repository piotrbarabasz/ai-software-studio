name: Autonomous Loop CI

on:
  push:
    paths:
      - "tools/studio_loop/**"
      - ".studio-loop/**"
      - ".codex/**"
      - ".agents/skills/studio-*/**"
      - "specs/007-autonomous-loop/**"
      - ".github/workflows/autonomous-loop-ci.yml"
  pull_request:
    paths:
      - "tools/studio_loop/**"
      - ".studio-loop/**"
      - ".codex/**"
      - ".agents/skills/studio-*/**"
      - "specs/007-autonomous-loop/**"
      - ".github/workflows/autonomous-loop-ci.yml"

permissions:
  contents: read

jobs:
  controller-validation:
    name: Controller validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout without writable credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/studio_loop/pyproject.toml
      - name: Install controller with development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "tools/studio_loop[dev]"
      - name: Full pytest suite
        run: python -m pytest tools/studio_loop/tests -ra
      - name: Ruff lint
        run: python -m ruff check tools/studio_loop .codex/hooks
      - name: Ruff format check
        run: python -m ruff format --check tools/studio_loop .codex/hooks
      - name: MyPy strict
        run: python -m mypy tools/studio_loop/src
      - name: Compile Python sources
        run: python -m compileall -q tools/studio_loop/src .codex/hooks
      - name: Validate JSON Schemas and TOML
        run: python -m pytest tools/studio_loop/tests/test_schemas.py -q
      - name: Test hooks without optional Codex ExecPolicy
        run: python -m pytest tools/studio_loop/tests/test_codex_project_guards.py -k "not execpolicy" -q
      - name: Test skills and controller configuration
        run: python -m pytest tools/studio_loop/tests/test_codex_project_guards.py::test_skills_and_guidance_match_the_cli_and_safety_contract tools/studio_loop/tests/test_role_configuration.py tools/studio_loop/tests/test_validation_profiles.py -q
      - name: Dry-run E2E
        run: python -m pytest tools/studio_loop/tests/test_cli_feature_git.py::test_start_dry_run_is_json_only_and_does_not_mutate tools/studio_loop/tests/test_autonomous_controller.py::test_dry_run_has_no_effects -q
      - name: Local E2E in a temporary repository
        run: python -m pytest tools/studio_loop/tests/test_cli_feature_git.py::test_cli_local_lifecycle_and_draft_pr_controlled_stop -q
      - name: Mocked draft-PR E2E
        run: python -m pytest tools/studio_loop/tests/test_draft_pr_services.py::test_mocked_draft_pr_service_e2e -q

  codex-execpolicy:
    name: Optional Codex ExecPolicy (${{ matrix.os }})
    if: ${{ vars.RUN_CODEX_EXECPOLICY == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout without writable credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Require Codex CLI explicitly
        run: codex --version
      - name: Install controller test dependencies
        run: python -m pip install -e "tools/studio_loop[dev]"
      - name: Verify command rules through Codex ExecPolicy
        run: python -m pytest tools/studio_loop/tests/test_codex_project_guards.py -k execpolicy -q
