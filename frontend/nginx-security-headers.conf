add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
add_header X-Frame-Options "DENY" always;
add_header Strict-Transport-Security "$hsts_header" always;
add_header X-Robots-Tag "__ROBOTS_HEADER__" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' __CSP_CONNECT_SRC__; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; object-src 'none'; script-src 'self' __CSP_SCRIPT_HASHES__; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; worker-src 'self'" always;
