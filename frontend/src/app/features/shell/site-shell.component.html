<a class="skip-link" href="#main-content">Przejdź do treści</a>

<header class="site-header">
  <a class="brand" routerLink="/" (click)="closeNavigation()" aria-label="AISoftware Studio">
    <span class="brand-mark" aria-hidden="true">AI</span>
    <span>AISoftware Studio</span>
  </a>

  <button
    type="button"
    class="menu-toggle"
    aria-controls="primary-navigation"
    [attr.aria-expanded]="isMobileNavigationOpen"
    (click)="toggleNavigation()"
  >
    <span aria-hidden="true">{{ isMobileNavigationOpen ? '×' : '☰' }}</span>
    <span>{{ isMobileNavigationOpen ? 'Zamknij menu' : 'Menu' }}</span>
  </button>

  <nav
    id="primary-navigation"
    class="primary-nav"
    [class.is-open]="isMobileNavigationOpen"
    aria-label="Główna nawigacja"
  >
    <div class="nav-links">
      <a
        routerLink="/demo-ai"
        routerLinkActive="is-active"
        #demoLink="routerLinkActive"
        [attr.aria-current]="demoLink.isActive ? 'page' : null"
        (click)="closeNavigation()"
        >Demo w 7 dni</a
      >
      <a
        routerLink="/development"
        routerLinkActive="is-active"
        #developmentLink="routerLinkActive"
        [attr.aria-current]="developmentLink.isActive ? 'page' : null"
        (click)="closeNavigation()"
        >Development</a
      >
      <a
        routerLink="/studio"
        routerLinkActive="is-active"
        #studioLink="routerLinkActive"
        [attr.aria-current]="studioLink.isActive ? 'page' : null"
        (click)="closeNavigation()"
        >Studio</a
      >
      <a
        routerLink="/kontakt"
        routerLinkActive="is-active"
        #contactLink="routerLinkActive"
        [attr.aria-current]="contactLink.isActive ? 'page' : null"
        (click)="closeNavigation()"
        >Kontakt</a
      >
    </div>
  </nav>
</header>

<main id="main-content" class="site-main" tabindex="-1">
  <router-outlet />
</main>

<footer class="site-footer">
  <p>AISoftware Studio — samodzielnie prowadzone studio tworzące dema AI i rozwiązania cyfrowe.</p>
  <div class="footer-links">
    <a routerLink="/demo-ai" (click)="closeNavigation()">Demo w 7 dni</a>
    <a routerLink="/development" (click)="closeNavigation()">Development</a>
    <a routerLink="/studio" (click)="closeNavigation()">Studio</a>
    <a routerLink="/rd" (click)="closeNavigation()">R&D</a>
    <a routerLink="/kontakt" (click)="closeNavigation()">Kontakt</a>
  </div>
</footer>
