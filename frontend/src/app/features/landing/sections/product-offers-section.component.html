<section class="section product-offers" aria-labelledby="product-offers-title">
  <div class="section-shell" appRevealOnScroll>
    <div class="section-heading">
      <p class="section-kicker">Kierunki demo</p>
      <h2 id="product-offers-title">Wybierz scenariusz, który chcesz zobaczyć</h2>
      <p class="section-lead">
        Każda karta wybiera jedną prezentację przepływu. To materiał do rozmowy o zakresie, nie
        gotowy system.
      </p>
    </div>
    <div class="offers-grid" role="tablist" aria-label="Scenariusze demo">
      <button
        *ngFor="let offer of offers"
        type="button"
        class="offer-card"
        role="tab"
        [attr.id]="'showcase-tab-' + offer.id"
        [class.is-selected]="offer.id === selectedId"
        [attr.aria-selected]="offer.id === selectedId"
        [attr.aria-controls]="showcasePanelId"
        (click)="selectedOfferIdChange.emit(offer.id)"
      >
        <span class="offer-card__label">{{ offer.shortLabel }}</span>
        <h3>{{ offer.title }}</h3>
        <p>{{ offer.summary }}</p>
        <span class="offer-card__outcome"
          ><strong>{{ offer.businessOutcome }}</strong></span
        >
        <span class="offer-card__select">{{
          offer.id === selectedId ? 'Wybrano scenariusz' : 'Pokaż scenariusz'
        }}</span>
      </button>
    </div>
  </div>
</section>
