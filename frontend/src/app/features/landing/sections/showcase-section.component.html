<section
  [attr.id]="showcase.id"
  class="section showcase-section"
  [attr.data-visual-kind]="showcase.visualKind"
  [attr.aria-labelledby]="showcase.id + '-title'"
>
  <div class="section-shell showcase-grid" appRevealOnScroll>
    <div class="showcase-copy">
      <p class="section-kicker">{{ showcase.eyebrow }}</p>
      <h2 [attr.id]="showcase.id + '-title'">{{ showcase.title }}</h2>
      <p class="section-lead">{{ showcase.lead }}</p>
      <p class="presentation-label">{{ showcase.presentationLabel }}</p>

      <div class="showcase-lists">
        <div>
          <h3>Workflow demo</h3>
          <ol>
            <li *ngFor="let step of showcase.workflowSteps">{{ step }}</li>
          </ol>
        </div>
        <div>
          <h3>Co sprawdzamy</h3>
          <ul>
            <li *ngFor="let point of showcase.proofPoints">{{ point }}</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="showcase-visual" [ngSwitch]="showcase.visualKind">
      <app-rag-workflow-visual *ngSwitchCase="'rag'" />
      <app-website-seo-visual *ngSwitchCase="'websiteSeo'" />
      <app-voice-waveform-visual *ngSwitchCase="'voice'" />
      <app-whatsapp-control-visual *ngSwitchCase="'whatsapp'" />
      <app-email-pipeline-visual *ngSwitchCase="'email'" />
      <app-agent-panel-preview *ngSwitchCase="'panel'" />
    </div>
  </div>
</section>
