<section id="contact" class="section contact-cta-section" aria-labelledby="contact-title">
  <div class="section-shell contact-cta-layout" appRevealOnScroll>
    <div class="contact-cta-copy">
      <p class="section-kicker">Kontakt</p>
      <h2 id="contact-title">{{ content.title }}</h2>
      <p class="section-lead">{{ content.lead }}</p>
      <ul aria-label="Co ustalimy po wysłaniu formularza">
        <li>który produktowy kierunek demo pasuje do celu biznesowego</li>
        <li>jakie materiały są potrzebne przed rozpoczęciem sprintu</li>
        <li>czy zakres mieści się w prezentacyjnym demo bez produkcyjnych integracji</li>
      </ul>
    </div>

    <app-contact-form />
  </div>
</section>
