<div class="studio-page">
  <section class="hero section-shell" appRevealOnScroll>
    <div class="hero-copy">
      <p class="eyebrow">{{ content.eyebrow }}</p>
      <h1>{{ content.title }}</h1>
      <p class="page-lead">{{ content.lead }}</p>
    </div>
    <aside class="hero-panel" aria-label="Zasady współpracy">
      <p class="panel-kicker">Zasady współpracy</p>
      <ul>
        <li *ngFor="let item of content.principles">{{ item }}</li>
      </ul>
      <a class="primary-action" routerLink="/kontakt" [queryParams]="{ interest: 'general' }">
        {{ content.ctaLabel }}
      </a>
    </aside>
  </section>

  <section class="section-shell" aria-labelledby="capabilities-title" appRevealOnScroll>
    <div class="section-heading">
      <p class="eyebrow">Kompetencje</p>
      <h2 id="capabilities-title">Zakres techniczny dobierany do problemu</h2>
    </div>
    <div class="card-grid">
      <article *ngFor="let capability of content.capabilities" class="info-card">
        <h3>{{ capability }}</h3>
      </article>
    </div>
  </section>

  <section class="section-shell section-muted" aria-labelledby="approach-title" appRevealOnScroll>
    <div class="section-heading">
      <p class="eyebrow">Sposób pracy</p>
      <h2 id="approach-title">Małe iteracje i jasne granice odpowiedzialności</h2>
    </div>
    <ol class="process-list">
      <li *ngFor="let item of content.engagementModel; let index = index">
        <span class="step-number">{{ index + 1 }}</span>
        <p>{{ item }}</p>
      </li>
    </ol>
  </section>
</div>
