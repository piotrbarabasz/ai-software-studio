<div class="studio-page">
  <section class="hero section-shell" appRevealOnScroll>
    <div class="hero-copy">
      <p class="eyebrow">{{ routeContent.eyebrow }}</p>
      <h1>{{ routeContent.title }}</h1>
      <p class="page-lead">{{ routeContent.lead }}</p>
    </div>
    <aside class="hero-panel" aria-label="Zasady współpracy">
      <p class="panel-kicker">Zasady współpracy</p>
      <ul>
        <li *ngFor="let item of routeContent.principles">{{ item }}</li>
      </ul>
      <a class="primary-action" routerLink="/kontakt">{{ routeContent.ctaLabel }}</a>
    </aside>
  </section>

  <section class="section-shell" aria-labelledby="approach-title" appRevealOnScroll>
    <div class="section-heading">
      <p class="eyebrow">Sposób pracy</p>
      <h2 id="approach-title">Małe iteracje i jasne granice odpowiedzialności</h2>
      <p class="page-lead">{{ routeContent.lead }}</p>
    </div>
    <div class="approach-grid">
      <article>
        <h3>Jak zaczynamy</h3>
        <ul>
          <li *ngFor="let item of routeContent.engagementModel">{{ item }}</li>
        </ul>
      </article>
      <article>
        <h3>O studio</h3>
        <p>{{ content.about.body }}</p>
      </article>
    </div>
  </section>

  <app-trust-section [content]="content.trust" />
</div>
