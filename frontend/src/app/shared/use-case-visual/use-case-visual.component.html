<div class="use-case-visual" aria-hidden="true">
  <div class="visual-flow" [class]="flowClass">
    @for (label of flowLabels; track label; let last = $last; let index = $index) {
      <span
        class="visual-node"
        [class.visual-node-accent]="index === 1"
        [class.visual-node-result]="index === flowLabels.length - 1"
        >{{ label }}</span
      >
      @if (!last) {
        <span class="visual-connector"></span>
      }
    }
  </div>
</div>
