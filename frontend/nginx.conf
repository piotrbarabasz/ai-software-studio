map $http_x_forwarded_proto $hsts_header {
  default "";
  https "max-age=31536000";
}

server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;
  error_page 404 /404/index.html;
  include /etc/nginx/security-headers.conf;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

  location = /demo-w-7-dni { return 301 /demo-ai; }
  location = /produkty { return 301 /development; }
  location = /produkty/asystent-wiedzy-rag { return 301 /development; }
  location = /produkty/strony-seo { return 301 /development; }
  location = /produkty/voice-agent { return 301 /development; }
  location = /produkty/whatsapp-ai { return 301 /development; }
  location = /produkty/automatyzacja-email { return 301 /development; }
  location = /produkty/panel-agentow { return 301 /development; }

  location /assets/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  location ~* "-[a-z0-9]{8,}\.(?:css|js|mjs|json|svg)$" {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  location ~* \.json$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /robots.txt {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = /sitemap.xml {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  location = / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /index.html =404;
  }

  location = /demo-ai {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /demo-ai/index.html =404;
  }

  location = /demo-ai/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /demo-ai/index.html =404;
  }

  location = /development {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /development/index.html =404;
  }

  location = /development/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /development/index.html =404;
  }

  location = /studio {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /studio/index.html =404;
  }

  location = /studio/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /studio/index.html =404;
  }

  location = /rd {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /rd/index.html =404;
  }

  location = /rd/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /rd/index.html =404;
  }

  location = /kontakt {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /kontakt/index.html =404;
  }

  location = /kontakt/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /kontakt/index.html =404;
  }

  location = /polityka-prywatnosci {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /polityka-prywatnosci/index.html =404;
  }

  location = /polityka-prywatnosci/ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files /polityka-prywatnosci/index.html =404;
  }

  location = /404/index.html {
    internal;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header X-Robots-Tag "noindex, follow" always;
    try_files $uri =404;
  }

  location / {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header X-Robots-Tag "noindex, follow" always;
    return 404;
  }
}
