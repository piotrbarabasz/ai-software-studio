substitutions:
  _PROJECT_ID: "<PROJECT_ID>"
  _REGION: "europe-central2"

steps:
  - id: backend-checks
    name: python:3.12-slim
    entrypoint: sh
    args:
      [
        "-c",
        "cd backend && python -m pip install --upgrade pip && python -m pip install -e \".[dev]\" && ruff check . && ruff format --check . && pytest",
      ]

  - id: frontend-checks
    name: cypress/browsers:node20.11.1-chrome120-ff121
    entrypoint: sh
    waitFor: ["-"]
    args:
      [
        "-c",
        "cd frontend && npm ci && npm run lint && npm run format:check && npm test && npm run build",
      ]
