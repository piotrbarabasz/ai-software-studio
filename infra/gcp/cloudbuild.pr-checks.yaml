substitutions:
  _PROJECT_ID: "<PROJECT_ID>"
  _REGION: "europe-central2"

steps:
  - id: backend-checks
    name: python:3.12-slim
    entrypoint: sh
    args:
      [
        "-c",
        "cd backend && python -m pip install --requirement requirements-dev.lock && python -m pip install --no-deps --no-build-isolation --editable . && python -m ruff check . && python -m ruff format --check . && python -m pytest && python -m unittest discover -s ../infra/gcp/tests -p 'test_cloudbuild_yaml.py'",
      ]

  - id: deployment-contract-tests
    name: python:3.12-slim
    entrypoint: python
    waitFor: ["-"]
    args:
      [
        "-m",
        "unittest",
        "discover",
        "-s",
        "infra/gcp/tests",
        "-p",
        "test_deployment*.py",
      ]

  - id: frontend-checks
    name: cypress/browsers:node20.11.1-chrome120-ff121
    entrypoint: sh
    waitFor: ["-"]
    args:
      [
        "-c",
        "cd frontend && npm ci && npm run lint && npm run format:check && npm test && npm run build:development",
      ]
