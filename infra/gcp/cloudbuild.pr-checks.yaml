substitutions:
  _PUBLIC_SITE_INDEXING: "false"

steps:
  - id: preview-config-preflight
    name: python:3.12-slim
    entrypoint: python
    env: ["DEPLOY_PUBLIC_SITE_INDEXING=$_PUBLIC_SITE_INDEXING"]
    args: ["scripts/gcp/deployment_contract.py", "--scope", "preview"]

  - id: backend-checks
    name: python:3.12-slim
    entrypoint: sh
    waitFor: ["preview-config-preflight"]
    args:
      [
        "-c",
        "cd backend && python -m pip install --requirement requirements-dev.lock && python -m pip install --no-deps --no-build-isolation --editable . && python -m ruff check . && python -m ruff format --check . && python -m pytest && python -m unittest discover -s ../infra/gcp/tests -p 'test_cloudbuild_yaml.py'",
      ]

  - id: deployment-contract-tests
    name: python:3.12-slim
    entrypoint: python
    waitFor: ["preview-config-preflight"]
    args:
      [
        "-m",
        "unittest",
        "discover",
        "-s",
        "infra/gcp/tests",
        "-p",
        "test_deployment*.py",
      ]

  - id: frontend-checks
    name: cypress/browsers:node-20.11.1-chrome-123.0.6312.58-1-ff-124.0-edge-122.0.2365.92-1@sha256:a73fe736a24ad0ba8913c7e4138a1331eb1d361ad5d63976d05a337129639c7e
    entrypoint: sh
    waitFor: ["preview-config-preflight"]
    args:
      [
        "-c",
        "cd frontend && npm ci && npm run format:check && npm run lint && npm test -- --karma-config=karma.ci.conf.cjs --browsers=ChromeHeadlessCI && npm run build:development",
      ]
