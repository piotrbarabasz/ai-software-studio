# Explicit manual component image pipeline. It never deploys a Cloud Run service.
substitutions:
  _PROJECT_ID: "required-project-id"
  _REGION: "required-region"
  _ARTIFACT_REPO: "required-artifact-repo"
  _SERVICE_NAME: "required-backend-service"
  _IMAGE_NAME: "required-backend-image"
  _IMAGE_TAG: "required-commit-sha"
  _MIN_INSTANCES: "<REQUIRED_INTEGER>"
  _APP_ENV: "<REQUIRED_APP_ENV>"
  _PUBLIC_SITE_URL: "<REQUIRED_PUBLIC_SITE_URL>"
  _CORS_ALLOWED_ORIGINS: "<REQUIRED_CORS_ORIGIN>"
  _CONTACT_DELIVERY_MODE: "<REQUIRED_DELIVERY_MODE>"
  _CONTACT_RECIPIENT_EMAIL: "<REQUIRED_EMAIL>"
  _CONTACT_FROM_EMAIL: "<REQUIRED_EMAIL>"
  _SMTP_HOST: "<REQUIRED_SMTP_HOST>"
  _SMTP_PORT: "<REQUIRED_PORT>"
  _SMTP_USERNAME: "<REQUIRED_SMTP_USERNAME>"
  _SMTP_USE_TLS: "<REQUIRED_BOOLEAN>"
  _CONTACT_RATE_LIMIT_PER_MINUTE: "<REQUIRED_INTEGER>"
  _SMTP_PASSWORD_SECRET: "required-secret-name"

steps:
  - id: manual-backend-preflight
    name: python:3.12-slim
    entrypoint: python
    env:
      - "DEPLOY_PROJECT_ID=$_PROJECT_ID"
      - "DEPLOY_REGION=$_REGION"
      - "DEPLOY_ARTIFACT_REPO=$_ARTIFACT_REPO"
      - "DEPLOY_BACKEND_SERVICE=$_SERVICE_NAME"
      - "DEPLOY_BACKEND_IMAGE_NAME=$_IMAGE_NAME"
      - "DEPLOY_PUBLIC_SITE_URL=$_PUBLIC_SITE_URL"
      - "DEPLOY_CORS_ALLOWED_ORIGINS=$_CORS_ALLOWED_ORIGINS"
      - "DEPLOY_SMTP_PASSWORD_SECRET=$_SMTP_PASSWORD_SECRET"
      - "DEPLOY_CONTACT_RATE_LIMIT_PER_MINUTE=$_CONTACT_RATE_LIMIT_PER_MINUTE"
      - "DEPLOY_CONTACT_RECIPIENT_EMAIL=$_CONTACT_RECIPIENT_EMAIL"
      - "DEPLOY_CONTACT_FROM_EMAIL=$_CONTACT_FROM_EMAIL"
      - "DEPLOY_SMTP_HOST=$_SMTP_HOST"
      - "DEPLOY_SMTP_PORT=$_SMTP_PORT"
      - "DEPLOY_SMTP_USERNAME=$_SMTP_USERNAME"
      - "DEPLOY_SMTP_USE_TLS=$_SMTP_USE_TLS"
      - "DEPLOY_CONTACT_DELIVERY_MODE=$_CONTACT_DELIVERY_MODE"
      - "DEPLOY_APP_ENV=$_APP_ENV"
      - "DEPLOY_MIN_INSTANCES=$_MIN_INSTANCES"
      - "DEPLOY_IMAGE_TAG=$_IMAGE_TAG"
    args: ["scripts/gcp/deployment_contract.py", "--scope", "backend"]

  - id: manual-backend-checks
    name: python:3.12-slim
    entrypoint: sh
    waitFor: ["manual-backend-preflight"]
    args:
      - -c
      - >-
        cd backend &&
        python -m pip install --requirement requirements-dev.lock &&
        python -m pip install --no-deps --no-build-isolation --editable . &&
        python -m ruff check . &&
        python -m ruff format --check . &&
        python -m pytest &&
        python -m unittest discover -s ../infra/gcp/tests -p 'test_cloudbuild_yaml.py'

  - id: manual-backend-build
    name: gcr.io/cloud-builders/docker
    waitFor: ["manual-backend-checks"]
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG"
      - .

  - id: manual-backend-smoke
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    waitFor: ["manual-backend-build"]
    env:
      - "DEPLOY_APP_ENV=$_APP_ENV"
      - "DEPLOY_CORS_ALLOWED_ORIGINS=$_CORS_ALLOWED_ORIGINS"
      - "DEPLOY_CONTACT_DELIVERY_MODE=$_CONTACT_DELIVERY_MODE"
      - "DEPLOY_CONTACT_RECIPIENT_EMAIL=$_CONTACT_RECIPIENT_EMAIL"
      - "DEPLOY_CONTACT_FROM_EMAIL=$_CONTACT_FROM_EMAIL"
      - "DEPLOY_SMTP_HOST=$_SMTP_HOST"
      - "DEPLOY_SMTP_PORT=$_SMTP_PORT"
      - "DEPLOY_SMTP_USERNAME=$_SMTP_USERNAME"
      - "DEPLOY_SMTP_USE_TLS=$_SMTP_USE_TLS"
      - "DEPLOY_CONTACT_RATE_LIMIT_PER_MINUTE=$_CONTACT_RATE_LIMIT_PER_MINUTE"
    args:
      - scripts/gcp/smoke-backend-image.sh
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG"

  - id: manual-backend-push
    name: gcr.io/cloud-builders/docker
    waitFor: ["manual-backend-smoke"]
    args:
      - push
      - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG"
