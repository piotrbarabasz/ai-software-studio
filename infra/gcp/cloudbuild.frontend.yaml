substitutions:
  _PROJECT_ID: "<PROJECT_ID>"
  _REGION: "europe-central2"
  _ARTIFACT_REPO: "aisoftware-studio"
  _SERVICE_NAME: "aisoftware-studio-web"
  _IMAGE_NAME: "aisoftware-studio-web"
  _IMAGE_TAG: "manual-local"
  _MIN_INSTANCES: "0"
  _API_URL: "https://<BACKEND_CLOUD_RUN_URL>"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "frontend/Dockerfile",
        "--build-arg",
        "API_URL=$_API_URL",
        "-t",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
        "frontend",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "$_SERVICE_NAME",
        "--project=$_PROJECT_ID",
        "--region=$_REGION",
        "--platform=managed",
        "--image=$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
        "--allow-unauthenticated",
        "--min-instances=$_MIN_INSTANCES",
      ]

images:
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG"
