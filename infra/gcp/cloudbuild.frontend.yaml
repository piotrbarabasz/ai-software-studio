substitutions:
  _PROJECT_ID: "<PROJECT_ID>"
  _REGION: "europe-central2"
  _ARTIFACT_REPO: "aisoftware-studio"
  _SERVICE_NAME: "aisoftware-studio-web"
  _IMAGE_NAME: "aisoftware-studio-web"
  _IMAGE_TAG: "manual-local"
  _MIN_INSTANCES: "0"
  _API_URL: "https://<BACKEND_CLOUD_RUN_URL>"
  _PUBLIC_SITE_URL: "https://protolume.pl"
  _PUBLIC_SITE_INDEXING: "false"
  _PUBLIC_LEGAL_CONFIG_SECRET: "aisoftware-studio-public-legal-config"

steps:
  - id: frontend-public-legal-config
    name: node:20-bookworm-slim
    entrypoint: node
    secretEnv: ["PUBLIC_LEGAL_CONFIG_JSON"]
    args: ["frontend/scripts/write-build-legal-config.cjs"]

  - name: gcr.io/cloud-builders/docker
    waitFor: ["frontend-public-legal-config"]
    env: ["DOCKER_BUILDKIT=1"]
    args:
      [
        "build",
        "-f",
        "frontend/Dockerfile",
        "--secret",
        "id=public_legal_config,src=frontend/.public-legal-config.json",
        "--build-arg",
        "API_URL=$_API_URL",
        "--build-arg",
        "PUBLIC_SITE_URL=$_PUBLIC_SITE_URL",
        "--build-arg",
        "PUBLIC_SITE_INDEXING=$_PUBLIC_SITE_INDEXING",
        "-t",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
        "frontend",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "$_SERVICE_NAME",
        "--project=$_PROJECT_ID",
        "--region=$_REGION",
        "--platform=managed",
        "--image=$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG",
        "--allow-unauthenticated",
        "--min-instances=$_MIN_INSTANCES",
      ]

images:
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_IMAGE_NAME:$_IMAGE_TAG"

availableSecrets:
  secretManager:
    - versionName: projects/$_PROJECT_ID/secrets/$_PUBLIC_LEGAL_CONFIG_SECRET/versions/latest
      env: PUBLIC_LEGAL_CONFIG_JSON
