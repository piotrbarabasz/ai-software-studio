substitutions:
  _PROJECT_ID: "<PROJECT_ID>"
  _REGION: "europe-central2"
  _ARTIFACT_REPO: "aisoftware-studio"
  _BACKEND_SERVICE: "aisoftware-studio-api"
  _FRONTEND_SERVICE: "aisoftware-studio-web"
  _BACKEND_IMAGE_NAME: "aisoftware-studio-api"
  _FRONTEND_IMAGE_NAME: "aisoftware-studio-web"
  _BACKEND_URL: "https://<BACKEND_CLOUD_RUN_URL>"
  _FRONTEND_URL: "https://<FRONTEND_CLOUD_RUN_URL>"
  _SMTP_PASSWORD_SECRET: "aisoftware-studio-smtp-password"
  _CONTACT_RATE_LIMIT_PER_MINUTE: "30"
  _CONTACT_RECIPIENT_EMAIL: "owner@example.com"
  _CONTACT_FROM_EMAIL: "noreply@example.com"
  _SMTP_HOST: "smtp.example.com"
  _SMTP_PORT: "587"
  _SMTP_USERNAME: "smtp-user@example.com"
  _SMTP_USE_TLS: "true"
  _CONTACT_DELIVERY_MODE: "email"
  _APP_ENV: "production"
  _MIN_INSTANCES: "0"
  _IMAGE_TAG: "manual-local"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: backend-build
    name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "backend/Dockerfile",
        "-t",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_BACKEND_IMAGE_NAME:$_IMAGE_TAG",
        "backend",
      ]

  - id: backend-push
    name: gcr.io/cloud-builders/docker
    waitFor: ["backend-build"]
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_BACKEND_IMAGE_NAME:$_IMAGE_TAG",
      ]

  - id: backend-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    waitFor: ["backend-push"]
    args:
      [
        "run",
        "deploy",
        "$_BACKEND_SERVICE",
        "--project=$_PROJECT_ID",
        "--region=$_REGION",
        "--platform=managed",
        "--image=$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_BACKEND_IMAGE_NAME:$_IMAGE_TAG",
        "--allow-unauthenticated",
        "--min-instances=$_MIN_INSTANCES",
        "--set-env-vars=APP_ENV=$_APP_ENV,CORS_ALLOWED_ORIGINS=$_FRONTEND_URL,CONTACT_DELIVERY_MODE=$_CONTACT_DELIVERY_MODE,CONTACT_RECIPIENT_EMAIL=$_CONTACT_RECIPIENT_EMAIL,CONTACT_FROM_EMAIL=$_CONTACT_FROM_EMAIL,SMTP_HOST=$_SMTP_HOST,SMTP_PORT=$_SMTP_PORT,SMTP_USERNAME=$_SMTP_USERNAME,SMTP_USE_TLS=$_SMTP_USE_TLS,CONTACT_RATE_LIMIT_PER_MINUTE=$_CONTACT_RATE_LIMIT_PER_MINUTE",
        "--set-secrets=SMTP_PASSWORD=$_SMTP_PASSWORD_SECRET:latest",
      ]

  - id: frontend-build
    name: gcr.io/cloud-builders/docker
    waitFor: ["backend-deploy"]
    args:
      [
        "build",
        "-f",
        "frontend/Dockerfile",
        "--build-arg",
        "API_URL=$_BACKEND_URL",
        "-t",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_FRONTEND_IMAGE_NAME:$_IMAGE_TAG",
        "frontend",
      ]

  - id: frontend-push
    name: gcr.io/cloud-builders/docker
    waitFor: ["frontend-build"]
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_FRONTEND_IMAGE_NAME:$_IMAGE_TAG",
      ]

  - id: frontend-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    waitFor: ["frontend-push"]
    args:
      [
        "run",
        "deploy",
        "$_FRONTEND_SERVICE",
        "--project=$_PROJECT_ID",
        "--region=$_REGION",
        "--platform=managed",
        "--image=$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_FRONTEND_IMAGE_NAME:$_IMAGE_TAG",
        "--allow-unauthenticated",
        "--min-instances=$_MIN_INSTANCES",
      ]

images:
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_BACKEND_IMAGE_NAME:$_IMAGE_TAG"
  - "$_REGION-docker.pkg.dev/$_PROJECT_ID/$_ARTIFACT_REPO/$_FRONTEND_IMAGE_NAME:$_IMAGE_TAG"
